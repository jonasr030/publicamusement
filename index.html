<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Public Amusement</title>
<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family: Arial, sans-serif;
background-image: url('5771373776317648078.jpg');
background-size: cover;
background-position: center;
background-repeat: no-repeat;
color:black;
}
.wrapper{
display:grid;
grid-template-columns: auto auto auto;
grid-template-rows: auto auto auto;
align-items:center;
justify-items:center;
gap:40px;
}
.logo{
grid-column: 2;
grid-row: 2;
max-width:200px;
width:80%;
display:block;
}
.link-top{
grid-column: 2;
grid-row: 1;
}
.link-bottom{
grid-column: 2;
grid-row: 3;
}
.link-left{
grid-column: 1;
grid-row: 2;
writing-mode: vertical-rl;
transform: rotate(180deg);
}
.link-right{
grid-column: 3;
grid-row: 2;
writing-mode: vertical-rl;
}
a{
font-size:16px;
font-weight:700;
color:white;
text-decoration:none;
-webkit-text-stroke: 0.5px black;
text-shadow: -1px -1px 0 black, 1px -1px 0 black, -1px 1px 0 black, 1px 1px 0 black;
}
a:hover{
text-decoration:underline;
}
</style>
</head>
<body>
<div class="wrapper">
  <a href="mailto:public.amusement@gmx.de" class="link-top">mail</a>
  <a href="https://t.me/publicamusementberlin" class="link-left">telegram</a>
  <img src="PA Logo Clean.jpg" class="logo" alt="Public Amusement">
  <a href="https://www.instagram.com/publicamusement/" class="link-right">instagram</a>
  <a href="https://soundcloud.com/public-amusement/" class="link-bottom">soundcloud</a>
</div>
</body>
</html>
